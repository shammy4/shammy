<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Music Links</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    background: #0a0a0f;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  .container {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.5rem;
  }

  .avatar {
    width: 96px;
    height: 96px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #ec4899, #f97316);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    color: white;
    font-weight: 700;
    flex-shrink: 0;
  }

  .profile {
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }

  .artist-name {
    font-size: 1.5rem;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: -0.02em;
  }

  .artist-bio {
    font-size: 0.9rem;
    color: #888;
    line-height: 1.5;
    max-width: 300px;
  }

  .genre-tags {
    display: flex;
    gap: 0.5rem;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 0.25rem;
  }

  .tag {
    font-size: 0.75rem;
    color: #a855f7;
    background: rgba(168, 85, 247, 0.12);
    border: 1px solid rgba(168, 85, 247, 0.25);
    padding: 0.2rem 0.6rem;
    border-radius: 100px;
    font-weight: 500;
  }

  .links {
    width: 100%;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 1rem;
    width: 100%;
    padding: 1rem 1.25rem;
    border-radius: 14px;
    text-decoration: none;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    transition: all 0.2s ease;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 0.2s;
  }

  .link-btn:hover {
    transform: translateY(-2px);
    border-color: rgba(255,255,255,0.15);
    background: rgba(255,255,255,0.08);
  }

  .link-btn:active {
    transform: translateY(0);
  }

  .platform-icon {
    width: 44px;
    height: 44px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .platform-icon svg {
    width: 24px;
    height: 24px;
  }

  .btn-text {
    flex: 1;
  }

  .btn-label {
    font-size: 0.7rem;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 0.15rem;
  }

  .btn-name {
    font-size: 1rem;
    font-weight: 600;
    color: #fff;
  }

  .arrow {
    color: rgba(255,255,255,0.3);
    font-size: 1.1rem;
    flex-shrink: 0;
  }

  /* Spotify - green */
  .spotify .platform-icon { background: rgba(29, 185, 84, 0.15); }
  .spotify .btn-label { color: #1DB954; }
  .spotify:hover { border-color: rgba(29, 185, 84, 0.4); }

  /* Apple Music - pink/red */
  .apple .platform-icon { background: rgba(252, 60, 68, 0.15); }
  .apple .btn-label { color: #fc3c44; }
  .apple:hover { border-color: rgba(252, 60, 68, 0.4); }

  /* YouTube Music - red */
  .youtube .platform-icon { background: rgba(255, 0, 0, 0.12); }
  .youtube .btn-label { color: #FF0000; }
  .youtube:hover { border-color: rgba(255, 0, 0, 0.35); }

  /* SoundCloud - orange */
  .soundcloud .platform-icon { background: rgba(255, 85, 0, 0.15); }
  .soundcloud .btn-label { color: #ff5500; }
  .soundcloud:hover { border-color: rgba(255, 85, 0, 0.4); }

  /* Amazon Music - teal/blue */
  .amazon .platform-icon { background: rgba(0, 168, 225, 0.15); }
  .amazon .btn-label { color: #00a8e1; }
  .amazon:hover { border-color: rgba(0, 168, 225, 0.4); }

  .divider {
    width: 100%;
    text-align: center;
    color: rgba(255,255,255,0.2);
    font-size: 0.75rem;
    letter-spacing: 0.1em;
    position: relative;
  }

  .divider::before, .divider::after {
    content: '';
    position: absolute;
    top: 50%;
    width: 40%;
    height: 1px;
    background: rgba(255,255,255,0.08);
  }
  .divider::before { left: 0; }
  .divider::after { right: 0; }


  /* Beatport - dark teal */
  .beatport .platform-icon { background: rgba(0, 210, 190, 0.15); }
  .beatport .btn-label { color: #00d2be; }
  .beatport:hover { border-color: rgba(0, 210, 190, 0.4); }

  .footer {
    font-size: 0.75rem;
    color: rgba(255,255,255,0.2);
  }
</style>
</head>
